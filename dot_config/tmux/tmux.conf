# Modern tmux config

# General
set -g set-titles on
set -g set-titles-string "#S:#I.#P #W"
set -g detach-on-destroy off
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -sg escape-time 50
set -sg repeat-time 600
set -g history-limit 100000
set -g focus-events on
set -g mouse on
setw -g clock-mode-style 24
setw -g monitor-activity on
set -g visual-activity off

# Terminal features
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-256color:RGB"
set -ga terminal-features ",*xterm*:sitm"
set -g extended-keys always
set -g set-clipboard on
set -g allow-passthrough on

# Vi-style copy mode
set -g mode-keys vi
bind V copy-mode
bind p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sh -c 'if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -in; elif command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v clip.exe >/dev/null 2>&1; then clip.exe; else cat >/dev/null; fi'"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "sh -c 'if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -in; elif command -v pbcopy >/dev/null 2>&1; then pbcopy; elif command -v clip.exe >/dev/null 2>&1; then clip.exe; else cat >/dev/null; fi'"

# Reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded Conf"

# Windows and panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n C-M-h select-pane -L
bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R
bind -n C-M-n next-window
bind -n C-M-p previous-window

bind -r C-h resize-pane -L 2
bind -r C-j resize-pane -D 2
bind -r C-k resize-pane -U 2
bind -r C-l resize-pane -R 2

bind z resize-pane -Z
bind s choose-tree -Zw
bind S setw synchronize-panes
bind P display-popup -E -w 90% -h 80% -d "#{pane_current_path}"

# Status line
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "fg=default,bg=default"
set -g status-left-length 80
set -g status-right-length 120
set -g status-justify absolute-centre
set -g status-left "#[fg=black,bold]#S "
set -g status-right "#[fg=colour244]#H "

setw -g window-status-separator " "
setw -g window-status-format "#[fg=colour244]#I:#W"
setw -g window-status-current-format "#[fg=black,bg=colour252,bold] #I:#W "

set -g pane-border-style "fg=colour250"
set -g pane-active-border-style "fg=colour39"
set -g display-panes-colour colour39
set -g display-panes-active-colour colour82
set -g message-style "fg=colour255,bg=colour39"
set -g mode-style "fg=colour255,bg=colour39"
